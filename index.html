<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>Tic-Tac-Toe</h1>

        <div id="game-mode-selection" class="content-box">
            <button id="player-vs-player" class="btn primary-btn">Player vs Player</button>
            <button id="player-vs-computer" class="btn primary-btn">Player vs Computer</button>
        </div>

        <div id="difficulty-selection" class="hidden content-box">
            <h2>Select Difficulty:</h2>
            <button id="difficulty-easy" class="btn secondary-btn">Easy</button>
            <button id="difficulty-hard" class="btn secondary-btn">Hard</button>
            <button id="back-from-difficulty" class="btn tertiary-btn">Back</button>
        </div>

        <div id="player-choice-container" class="hidden content-box">
            <h2>Choose your symbol:</h2>
            <div class="choice-buttons">
                <button id="choose-x" class="btn symbol-btn">X</button>
                <button id="choose-o" class="btn symbol-btn">O</button>
            </div>
            <button id="back-from-choice" class="btn tertiary-btn">Back</button>
        </div>

        <div id="game-container" class="hidden">

            <div id="status-message-container" aria-live="polite">
                <div id="status-message"></div>
                <div id="sub-message"></div>
            </div>

            <div id="timer-wrapper">
                <div class="timer-label">TIME</div>
                <div id="timer-display">Time left: 10</div>
            </div>

            <div id="board" role="grid" aria-label="Tic-Tac-Toe Board">
                <button class="cell" data-cell-index="0" aria-label="Cell 1, Empty"></button>
                <button class="cell" data-cell-index="1" aria-label="Cell 2, Empty"></button>
                <button class="cell" data-cell-index="2" aria-label="Cell 3, Empty"></button>
                <button class="cell" data-cell-index="3" aria-label="Cell 4, Empty"></button>
                <button class="cell" data-cell-index="4" aria-label="Cell 5, Empty"></button>
                <button class="cell" data-cell-index="5" aria-label="Cell 6, Empty"></button>
                <button class="cell" data-cell-index="6" aria-label="Cell 7, Empty"></button>
                <button class="cell" data-cell-index="7" aria-label="Cell 8, Empty"></button>
                <button class="cell" data-cell-index="8" aria-label="Cell 9, Empty"></button>
            </div>

            <div id="game-over-buttons">
                <button id="rematch-button" class="btn secondary-btn hidden">Rematch</button>
                <button id="restart-button" class="btn primary-btn">Restart Game</button>
            </div>
            <button id="back-from-game" class="btn tertiary-btn">Change Options</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
